name: Build Client Binary

on:
  push:
    branches: ["master"]
    paths:
      - 'client/**.go'
      - '.github/workflows/client.yml'

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            binary: client
          - goos: windows
            goarch: amd64
            binary: client.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'client/go.mod'
          cache: true
          cache-dependency-path: 'client/go.sum'

      - name: Cache Go build cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/go-build
          key: ${{ runner.os }}-go-build-client-${{ hashFiles('client/**.go') }}
          restore-keys: |
            ${{ runner.os }}-go-build-client-

      - name: Build client binary
        working-directory: ./client
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build -o ${{ matrix.binary }} .

      - name: Upload binary to R2
        uses: ryand56/r2-upload-action@latest
        with:
          r2-account-id: ${{ secrets.R2_ACCOUNT_ID }}
          r2-access-key-id: ${{ secrets.R2_ACCESS_KEY_ID }}
          r2-secret-access-key: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          r2-bucket: ${{ secrets.R2_BUCKET }}
          source-dir: client/${{ matrix.binary }}
          destination-dir: pointhole/client
          output-file-url: true
          multipart-size: 50