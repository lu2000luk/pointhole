name: Build Client Binary

on:
  push:
    branches: ["master"]
    paths:
      - "client/**.go"
      - ".github/workflows/client.yml"

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: client/go.mod
          cache: true
          cache-dependency-path: client/go.sum

      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libgtk-3-dev \
            libgl1-mesa-dev \
            xorg-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxi-dev
      - name: Build Linux client
        working-directory: ./client
        env:
          CGO_ENABLED: 1
        run: |
          go build -ldflags="-s -w" -v -o client .
      - name: Upload Linux binary
        uses: ryand56/r2-upload-action@latest
        with:
          r2-account-id: ${{ secrets.R2_ACCOUNT_ID }}
          r2-access-key-id: ${{ secrets.R2_ACCESS_KEY_ID }}
          r2-secret-access-key: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          r2-bucket: ${{ secrets.R2_BUCKET }}
          source-dir: client/client
          destination-dir: pointhole/client
          output-file-url: true

  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: client/go.mod
          cache: true
          cache-dependency-path: client/go.sum

      - name: Build Windows client
        working-directory: ./client
        env:
          CGO_ENABLED: 1
        run: |
          go build -ldflags="-extldflags=-static -s -w" -v -o client.exe .
      - name: Upload Windows binary
        uses: ryand56/r2-upload-action@latest
        with:
          r2-account-id: ${{ secrets.R2_ACCOUNT_ID }}
          r2-access-key-id: ${{ secrets.R2_ACCESS_KEY_ID }}
          r2-secret-access-key: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          r2-bucket: ${{ secrets.R2_BUCKET }}
          source-dir: client/client.exe
          destination-dir: pointhole/client
          output-file-url: true
